name: Bug report
description: Report a reproducible issue
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version (for example v1.0.2)
      placeholder: v1.0.2
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Proxmox version, OS, deployment mode (LXC or Docker), browser.
      placeholder: Proxmox VE 8.x, Debian 12, LXC, Chrome 123
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant logs and redact secrets.
      render: shell
