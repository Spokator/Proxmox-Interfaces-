name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare release variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          NOTES_FILE="release-notes-${TAG}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            echo "body_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          else
            AUTO_NOTES="release-notes-auto-${TAG}.md"
            {
              echo "# ${TAG}"
              echo
              echo "Automated release generated by GitHub Actions."
              echo
              echo "Main artifacts:"
              echo "- proxmox-interfaces-${TAG}.tar.gz"
              echo "- proxmox-interfaces-${TAG}.sha256"
              echo "- proxmox-interfaces-latest.tar.gz"
              echo "- proxmox-interfaces-latest.sha256"
            } > "$AUTO_NOTES"
            echo "body_path=${AUTO_NOTES}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.tag }}" bash deploy/proxmox-interfaces-release.sh

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          draft: false
          prerelease: false
          body_path: ${{ steps.vars.outputs.body_path }}
          generate_release_notes: true
          files: |
            dist/proxmox-interfaces-${{ steps.vars.outputs.tag }}.tar.gz
            dist/proxmox-interfaces-${{ steps.vars.outputs.tag }}.sha256
            dist/proxmox-interfaces-latest.tar.gz
            dist/proxmox-interfaces-latest.sha256
