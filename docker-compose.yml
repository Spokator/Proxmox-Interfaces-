version: "3.9"

services:
  proxmox-interfaces:
    build: .
    container_name: proxmox-interfaces
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./public/data/services.json:/app/public/data/services.json:rw
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
